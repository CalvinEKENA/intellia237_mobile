name: intellia237
description: "Application e-learning INTELLIA237."
publish_to: "none"
version: 3.0.0+22

environment:
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^17.1.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.4
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  lottie: ^3.3.1

  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  cloud_functions: ^6.0.2
  firebase_storage: ^13.1.0

  image_picker: ^1.1.2
  image_picker_android: ^0.8.13+14
  image_picker_platform_interface: ^2.11.1

  flutter_animate: ^4.5.0
  animations: ^2.0.11
  shimmer: ^3.0.0
  confetti: ^0.8.0
  flutter_native_splash: ^2.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    - assets/icons/
    - assets/branding/
    - assets/companions/
    - assets/lottie/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: assets/icons/icone_final.png
    background_color: "#FBFAF7"
    theme_color: "#5856D6"
  windows:
    generate: true
    image_path: assets/icons/icone_final.png
  macos:
    generate: true
    image_path: assets/icons/icone_final.png
  image_path: assets/icons/icone_final.png
  min_sdk_android: 21
  adaptive_icon_background: "#FBFAF7"
  adaptive_icon_foreground: assets/icons/icone_final.png

# Splash natif — couche A. Couleur de fond identique au premier frame du
# splash Flutter (web : #FAFAFD) pour éliminer toute frame blanche au cold start.
# Logo officiel INTELLIA237 (jamais l'ancien EduNova).
flutter_native_splash:
  color: "#FAFAFD"
  image: assets/icons/icone_final.png
  android: true
  ios: true
  web: true
  android_12:
    color: "#FAFAFD"
    image: assets/icons/icone_final.png
