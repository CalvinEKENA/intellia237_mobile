name: Foundation Quality

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - "fix/**"
      - "feature/**"

permissions:
  contents: read

jobs:
  flutter-quality:
    name: Flutter quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.2"
          cache: true

      - name: Resolve Flutter dependencies
        run: flutter pub get

      - name: Check Dart formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze Flutter sources
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

  functions-quality:
    name: Functions quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Functions tests
        run: npm test

      - name: Build Functions
        run: npm run build

      - name: Audit high and critical npm vulnerabilities
        run: npm audit --audit-level=high

  firebase-rules:
    name: Firebase rules
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Firebase CLI
        run: npm install --global firebase-tools@15.16.0

      - name: Run Firestore and Storage rules tests
        run: npm run test:rules
