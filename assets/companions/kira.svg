<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Avatar Kira (placeholder)">
  <defs>
    <linearGradient id="kira-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9ECD"/>
      <stop offset="100%" stop-color="#AF52DE"/>
    </linearGradient>
    <radialGradient id="kira-glow" cx="32%" cy="28%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.0"/>
    </radialGradient>
    <filter id="kira-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Base disc -->
  <circle cx="100" cy="100" r="100" fill="url(#kira-grad)"/>

  <!-- Subtle highlight -->
  <circle cx="100" cy="100" r="100" fill="url(#kira-glow)"/>

  <!-- Decorative orbiting dots -->
  <g opacity="0.55" filter="url(#kira-soft)">
    <circle cx="48" cy="62" r="3.5" fill="#ffffff"/>
    <circle cx="162" cy="76" r="2.4" fill="#ffffff"/>
    <circle cx="54" cy="150" r="2.2" fill="#ffffff"/>
    <circle cx="150" cy="148" r="3" fill="#ffffff"/>
  </g>

  <!-- Initial -->
  <text
    x="50%"
    y="54%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Plus Jakarta Sans', 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-weight="800"
    font-size="96"
    fill="#ffffff"
    letter-spacing="-2"
  >K</text>

  <!-- Inner ring accent -->
  <circle cx="100" cy="100" r="97" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
</svg>
